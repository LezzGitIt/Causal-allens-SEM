abstract: |
  Allen's rule — the tendency for animals to have relatively longer appendages in warmer climates — is commonly estimated by regressing a ratio of appendage to body mass on temperature, or by regressing appendage length on temperature with body mass as a covariate. The latter approach implicitly assumes that mass is a cause of appendage length; however, a more biologically defensible causal structure treats latent body size as the common driver of both mass and appendage lengths. Under this structure, conditioning on observed mass provides incomplete adjustment for latent body size and introduces bias in estimates of the direct temperature–appendage effect. Using causal directed acyclic graphs and structural equation modelling (SEM), I demonstrate this bias across a factorial simulation grid of 91 biologically realistic parameter combinations that vary the strength of Bergmann's rule, appendage–size relationships, and the magnitude of the Allen's rule signal. I then apply the same approaches to three empirical datasets spanning 95 bird species from diverse ecological systems. Four analytical approaches are compared: the appendage/mass ratio, mass as a covariate in multiple regression, the recently developed standardized length index (SLI), and a latent SEM that estimates body size from the shared variance among mass and multiple appendage measurements. The multiple regression approach systematically underestimated the true direct temperature effect, with bias increasing with the strength of Bergmann's rule and the appendage–size loading; the appendage/mass ratio was biased in the opposite direction. The SLI fell between the two, and tracked the simulated temperature effect closely when its allometric exponent was estimated rather than assumed. Only the latent SEM recovered the true direct effect across all parameter combinations. Mass measurement error compounded estimation failure in the multiple regression approach and introduced negative bias in the SLI; it shifted the ratio in the same negative direction, which coincidentally offset part of that method's positive bias. The latent SEM was relatively unaffected, and incorporating repeat mass measurements restored near-oracle performance. On real data the SEM is admissible only within a Bayesian framework: maximum likelihood returned improper solutions, and a hierarchical model that partially pools information across species and studies was needed to stabilize estimates for species with small samples. That model recovered a credibly positive population-mean Allen's rule effect in all three datasets. Its remaining limitation is imprecision rather than bias — interval width shrinks with per-species sample size — whereas misspecifying the number of latent factors produces bias that no amount of data will remove. Dependent on the true data-generating process, the latent SEM is an accurate and principled approach for estimating the direct temperature–appendage effect. I provide open-source code to implement the method in Stan and R.
keywords:
  - Allen's rule, body size, causal inference, ecogeographic rule, latent variable, relative appendage length, structural equation model, thermoregulation

